name: Update Map README

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch:       

jobs:
  update-map:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install networkx osmnx matplotlib pandas
        
    - name: Run update script and capture location
      id: run-script
      run: |
        python update_map.py
        LOCATION=$(python update_map.py --get-location)
        echo "LOCATION=$LOCATION" >> $GITHUB_ENV
        
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md map.png
        git commit -m "Update map and README for ${{ env.LOCATION }}" || echo "No changes to commit"
        git fetch origin
        git pull --rebase origin master 
        git push origin master